<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid #222; }
  header h1 { font-size: 1.1rem; font-weight: normal; letter-spacing: 0.15em; color: #888; text-transform: uppercase; }
  header h1 span { color: #4ade80; }
  .subtitle { font-size: 0.75rem; color: #444; margin-top: 4px; }
  .chat-area { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .msg { display: flex; gap: 1rem; max-width: 800px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; flex-shrink: 0; margin-top: 2px; }
  .msg.user .msg-avatar { background: #1a2e1a; color: #4ade80; border: 1px solid #2a3a2a; }
  .msg.agent .msg-avatar { background: #1a1a2e; color: #818cf8; border: 1px solid #2a2a3a; }
  .msg-bubble { font-size: 0.875rem; line-height: 1.7; padding: 0.75rem 1rem; border-radius: 8px; max-width: 620px; }
  .msg.user .msg-bubble { background: #0f1f0f; border: 1px solid #1a2e1a; color: #a0c8a0; }
  .msg.agent .msg-bubble { background: #111; border: 1px solid #1e1e1e; color: #d0d0d0; }
  .msg.agent .msg-bubble.error { border-color: #3a1a1a; color: #f87171; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .chip { background: transparent; border: 1px solid #222; color: #555; font-family: 'Courier New', monospace; font-size: 0.72rem; padding: 5px 10px; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
  .chip:hover { border-color: #4ade80; color: #4ade80; background: #0a1a0a; }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 0.75rem 1rem; }
  .dot { width: 5px; height: 5px; background: #333; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
  .input-bar { padding: 1.25rem 2.5rem; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; background: #0a0a0a; }
  .input-bar input { flex: 1; background: #111; border: 1px solid #222; color: #e0e0e0; font-family: 'Courier New', monospace; font-size: 0.875rem; padding: 10px 14px; border-radius: 6px; }
  .input-bar input:focus { outline: none; border-color: #4ade80; }
  .input-bar input::placeholder { color: #333; }
  .send-btn { background: #0f2a0f; border: 1px solid #1a4a1a; color: #4ade80; font-family: 'Courier New', monospace; font-size: 0.8rem; padding: 10px 18px; border-radius: 6px; cursor: pointer; letter-spacing: 0.08em; }
  .send-btn:hover:not(:disabled) { background: #163a16; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1><span>◈</span> STUDENT AGENT</h1>
  <div class="subtitle">powered by AWS + Claude</div>
</header>
<div class="chat-area" id="chat">
  <div class="msg agent">
    <div class="msg-avatar">AI</div>
    <div><div class="msg-bubble">
      Ready. Ask me anything about the students.
      <div class="suggestions">
        <button class="chip" onclick="ask(this.textContent)">How many students are Seniors?</button>
        <button class="chip" onclick="ask(this.textContent)">Which students play Basketball?</button>
        <button class="chip" onclick="ask(this.textContent)">What is the most popular major?</button>
        <button class="chip" onclick="ask(this.textContent)">Which state has the most students?</button>
        <button class="chip" onclick="ask(this.textContent)">Are there more male or female students?</button>
        <button class="chip" onclick="ask(this.textContent)">List all female Freshmen</button>
      </div>
    </div></div>
  </div>
</div>
<div class="input-bar">
  <input type="text" id="q" placeholder="Ask a question about the students..." onkeydown="if(event.key==='Enter')send()" />
  <button class="send-btn" id="btn" onclick="send()">SEND →</button>
</div>
<script>
  // !! REPLACE THIS with your API endpoint from deploy.py output !!
  const ENDPOINT = "https://YOUR_API_ID.execute-api.us-east-1.amazonaws.com/ask";

  const chat = document.getElementById('chat');
  const input = document.getElementById('q');
  const btn   = document.getElementById('btn');

  function addMsg(role, html, cls='') {
    const d = document.createElement('div');
    d.className = `msg ${role}`;
    d.innerHTML = `<div class="msg-avatar">${role==='user'?'YOU':'AI'}</div><div><div class="msg-bubble ${cls}">${html}</div></div>`;
    chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
  }
  function ask(q) { input.value = q; send(); }
  async function send() {
    const q = input.value.trim(); if (!q) return;
    if (ENDPOINT.includes("YOUR_API_ID")) {
      addMsg('agent', 'API endpoint not set. Open index.html and replace YOUR_API_ID with your real endpoint from deploy.py.', 'error');
      return;
    }
    input.value = ''; input.disabled = btn.disabled = true;
    addMsg('user', q);
    const t = addMsg('agent', '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>');
    try {
      const r = await fetch(ENDPOINT, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q})});
      const d = await r.json(); t.remove();
      r.ok ? addMsg('agent', d.answer) : addMsg('agent', `Error: ${d.error}`, 'error');
    } catch(e) { t.remove(); addMsg('agent', `Network error: ${e.message}`, 'error'); }
    input.disabled = btn.disabled = false; input.focus();
  }
</script>
</body>
</html>
